name: Build and Release

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code quality checks
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libglib2.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run rustfmt
        run: cd src-tauri && cargo fmt -- --check

      - name: Run clippy
        run: cd src-tauri && cargo clippy --all-targets -- -D warnings

      - name: Check dependencies
        run: cd src-tauri && cargo audit || true

  # Frontend checks (TypeScript/ESLint/Vitest/docs)
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Keep CI aligned with local dev tooling.
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show Node/npm versions
        run: |
          node --version
          npm --version

      # Work around intermittent npm 10.9.0 crashes on GitHub runners
      # ("Exit handler never called!").
      - name: Upgrade npm (stable)
        run: npm i -g npm@10.9.4

      - name: Install dependencies
        # Force devDependencies even if the runner sets NODE_ENV=production.
        run: npm ci --include=dev --no-audit --no-fund

      - name: Run frontend checks
        run: npm run check:frontend

  # Test suite
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libglib2.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cd src-tauri && cargo test -- --nocapture

      - name: Run doc tests
        run: cd src-tauri && cargo test --doc

  # Build for Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [lint, frontend, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        uses: actions/cache@v4
        with:
          path: src-tauri/target/release/clawstation
          key: ${{ runner.os }}-clawstation-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build AppImage
        run: |
          cd src-tauri
          cargo build --release
          mkdir -p release
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp target/release/clawstation AppDir/usr/bin/
          # Download and use appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          # Note: In production, you'd properly configure AppImage building
          echo "AppImage tool downloaded, full build would happen on tag"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: src-tauri/target/release/clawstation

  # Build for macOS
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    needs: [lint, frontend, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: intel
          - target: aarch64-apple-darwin
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show Node/npm versions
        run: |
          node --version
          npm --version

      - name: Upgrade npm (stable)
        run: npm i -g npm@10.9.4

      - name: Install dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Tauri bundles
        id: tauri_build
        continue-on-error: true
        run: |
          set -euo pipefail

          # Capture full output so we can surface it in the job summary on failure.
          # Build the .app bundle (DMG is optional and can be flaky on CI).
          npm run tauri:build -- --target ${{ matrix.target }} --bundles app --verbose 2>&1 | tee tauri-build.log
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      - name: Summarize Tauri build failure
        if: steps.tauri_build.outcome != 'success'
        run: |
          # GitHub Actions runs bash with `-e` by default; disable it so we can
          # always emit the failure annotation before we intentionally fail.
          set +e
          set +o pipefail

          {
            echo "## Tauri build failed (macOS ${{ matrix.target }})"
            echo ""
            echo "Last 200 lines of output:"
            echo ""
            echo '```'
            tail -n 200 tauri-build.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Also emit an annotation so the failure is visible from the Checks API
          # (handy when logs/artifacts aren't downloadable without auth).
          #
          # Escape according to workflow command rules:
          # https://docs.github.com/actions/using-workflows/workflow-commands-for-github-actions
          # Keep it one-line to reduce the chance of workflow-command parsing issues.
          # Keep the annotation small to avoid any server-side truncation/ignores.
          ONE_LINE="$(tail -n 10 tauri-build.log 2>/dev/null | tr '\n' ' ' | tr '\r' ' ')"
          ONE_LINE="$(printf '%s' "$ONE_LINE" | sed 's/%/%25/g' | cut -c1-1000)"
          echo "::error file=.github/workflows/build.yml,line=1,col=1,title=Tauri build failed (macOS ${{ matrix.target }})::${ONE_LINE}"

          # Keep the job failed.
          exit 1

      - name: Prepare macOS artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts

          # Raw binary (useful for debugging)
          cp "src-tauri/target/${{ matrix.target }}/release/clawstation" "release-artifacts/clawstation-macos-${{ matrix.arch }}" || true

          # App bundle (double-clickable when extracted)
          APP_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Expected a .app bundle at src-tauri/target/${{ matrix.target }}/release/bundle/macos, but none was found."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-artifacts/clawstation-macos-${{ matrix.arch }}.app.zip"

          # DMG (if produced by bundler)
          DMG_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle" -name '*.dmg' -print -quit || true)"
          if [ -n "$DMG_PATH" ]; then
            cp "$DMG_PATH" "release-artifacts/clawstation-macos-${{ matrix.arch }}.dmg"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-release
          path: release-artifacts/*

  # Build for Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [lint, frontend, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: |
          cd src-tauri
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: src-tauri/target/release/clawstation.exe

  # Create GitHub Release
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release
        id: prepare_release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Create release notes (best-effort)
          echo "## Changes in $TAG" > release_notes.md
          echo "" >> release_notes.md
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%an)" "${PREV_TAG}..${TAG}" >> release_notes.md
          else
            git log --pretty=format:"- %s (%an)" -n 50 >> release_notes.md
          fi

      - name: Prepare release assets (rename with OS/arch)
        run: |
          mkdir -p release-assets

          cp artifacts/linux-release/clawstation release-assets/clawstation-linux-x64
          cp artifacts/windows-release/clawstation.exe release-assets/clawstation-windows-x64.exe
          # macOS artifacts include a raw binary + .app.zip (and optionally a .dmg)
          cp artifacts/macos-intel-release/* release-assets/
          cp artifacts/macos-arm64-release/* release-assets/

          chmod +x release-assets/clawstation-linux-x64 release-assets/clawstation-macos-intel release-assets/clawstation-macos-arm64 || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io
  # Publish to crates.io - disabled for desktop application
  # Desktop apps don't need crates.io publishing
